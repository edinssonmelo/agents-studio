# .github/workflows/deploy.yml
# Deploys Agents Studio to the VPS on push to main.
# Requires GitHub secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_REPO_PATH

name: Deploy Agents Studio

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm test -- --passWithNoTests

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            REPO_PATH="${{ secrets.VPS_REPO_PATH }}"
            cd "$REPO_PATH"

            echo "==> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> Building and starting containers..."
            docker compose -p agents-studio --env-file .env up -d --build --remove-orphans

            echo "==> Waiting for health checks..."
            sleep 10

            echo "==> Verifying API health..."
            docker exec agents-studio-api wget -qO- http://localhost:3001/api/agents/health || echo "WARNING: API health check failed"

            echo "==> Done. Studio available at https://${{ vars.DOMAIN }}"

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Deployment status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ Deployment successful"
          else
            echo "❌ Deployment failed — check logs above"
            exit 1
          fi
