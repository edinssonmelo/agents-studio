# docker-compose.yml — Agents Studio (web + api + agent-core)
#
# Default: internal bridge network `agents-studio` (clone-and-run, no external network required).
# Copy .env.example → .env and set secrets. Quick start:
#   docker compose --env-file .env up -d --build
#
# Advanced (Traefik / existing proxy): see docs/ARCHITECTURE.md — attach services to your
# external network and set DOMAIN / labels accordingly.

networks:
  agents-studio:
    driver: bridge

volumes:
  studio_db:
    driver: local

services:

  # ── Agent Core (FastAPI, internal only) ─────────────────────────────────────
  agent_core:
    build:
      context: ./apps/agent-core
      dockerfile: Dockerfile
    container_name: agents-studio-agent-core
    restart: unless-stopped
    environment:
      AGENT_CORE_TOKEN: ${AGENT_CORE_TOKEN}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ASSISTANTS_YAML: /data/agent-core/assistants.yaml
      AGENT_CORE_CONFIG_ROOT: /data/agent-core
      AGENT_CORE_DATA_ROOT: /data/agent-core-data/users
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ${AGENT_CORE_CONFIG_PATH:-./apps/agent-core}:/data/agent-core:rw
      - ${AGENT_CORE_DATA_PATH:-./data/agent-core-data}:/data/agent-core-data:rw
    networks:
      - agents-studio
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8766/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── BFF ───────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: agents-studio-api
    restart: unless-stopped
    depends_on:
      agent_core:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      USER_ME_PASSWORD: ${USER_ME_PASSWORD}
      USER_WIFE_PASSWORD: ${USER_WIFE_PASSWORD}
      AGENT_CORE_URL: ${AGENT_CORE_URL:-http://agent_core:8766}
      AGENT_CORE_TOKEN: ${AGENT_CORE_TOKEN}
      AGENT_CORE_TIMEOUT: ${AGENT_CORE_TIMEOUT:-90000}
      AGENT_CORE_CONFIG_ROOT: /data/agent-core
      AGENT_CORE_DATA_ROOT: /data/agent-core-data
      DATABASE_URL: file:/data/studio/studio.db
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://${DOMAIN}}
    volumes:
      - studio_db:/data/studio
      - ${AGENT_CORE_CONFIG_PATH:-./apps/agent-core}:/data/agent-core:rw
      - ${AGENT_CORE_DATA_PATH:-./data/agent-core-data}:/data/agent-core-data:rw
    networks:
      - agents-studio
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/agents/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    labels:
      traefik.enable: "false"

  # ── Frontend ─────────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: http://api:3001
    container_name: agents-studio-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      API_INTERNAL_URL: http://api:3001
      HOSTNAME: "0.0.0.0"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - agents-studio
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - traefik.enable=true
      - "traefik.http.routers.agentsstudio.rule=Host(`${DOMAIN}`)"
      - traefik.http.routers.agentsstudio.entrypoints=web
      - traefik.http.services.agentsstudio.loadbalancer.server.port=3000
