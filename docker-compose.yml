# docker-compose.yml — reference stack for production-like deploys
#
# Requires: external Docker network `net_internal` (create: docker network create net_internal)
# and a running agent_core on that network. Copy .env.example → .env and set all variables.
#
# Example:
#   docker compose --env-file .env up -d --build

networks:
  net_internal:
    external: true

volumes:
  studio_db:
    driver: local

services:

  # ── BFF ───────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: agents-studio-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      USER_ME_PASSWORD: ${USER_ME_PASSWORD}
      USER_WIFE_PASSWORD: ${USER_WIFE_PASSWORD}
      # agent_core connection (never exposed to browser)
      AGENT_CORE_URL: ${AGENT_CORE_URL:-http://agent_core:8766}
      AGENT_CORE_TOKEN: ${AGENT_CORE_TOKEN}
      AGENT_CORE_TIMEOUT: ${AGENT_CORE_TIMEOUT:-90000}
      # agent_core CODE files (assistants.yaml + prompts/)
      AGENT_CORE_CONFIG_ROOT: /data/agent-core
      # agent_core DATA files (users/ memory)
      AGENT_CORE_DATA_ROOT: /data/agent-core-data
      # SQLite
      DATABASE_URL: file:/data/studio/studio.db
      # CORS — override for local HTTP (e.g. FRONTEND_ORIGIN=http://localhost:3000)
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://${DOMAIN}}
    volumes:
      - studio_db:/data/studio
      - ${AGENT_CORE_CONFIG_PATH:?Set AGENT_CORE_CONFIG_PATH in .env}:/data/agent-core:rw
      - ${AGENT_CORE_DATA_PATH:?Set AGENT_CORE_DATA_PATH in .env}:/data/agent-core-data:rw
    networks:
      - net_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/agents/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    labels:
      traefik.enable: "false"   # api is never public

  # ── Frontend ──────────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: http://api:3001
    container_name: agents-studio-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      API_INTERNAL_URL: http://api:3001
      # Next.js bind: container HOSTNAME defaults to container id; 0.0.0.0 enables loopback healthchecks
      HOSTNAME: "0.0.0.0"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - net_internal
    healthcheck:
      # / redirige (307 con Location raro) y wget falla; /login devuelve 200
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # Traefik (optional): adapt labels to your proxy / entrypoint names
    labels:
      - traefik.enable=true
      - "traefik.http.routers.agentsstudio.rule=Host(`${DOMAIN}`)"
      - traefik.http.routers.agentsstudio.entrypoints=web
      - traefik.http.services.agentsstudio.loadbalancer.server.port=3000
